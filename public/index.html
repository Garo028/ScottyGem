<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scotty AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080c14;
      --surface: #0d1420;
      --surface2: #111827;
      --border: #1e2d42;
      --accent: #00d4ff;
      --accent2: #0099cc;
      --accent-glow: rgba(0, 212, 255, 0.15);
      --text: #e8f4f8;
      --text-muted: #6b8499;
      --user-bubble: #0d2137;
      --ai-bubble: #0d1420;
      --error: #ff4d6d;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; overflow: hidden; }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 80% 10%, rgba(0,212,255,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 40% 60% at 10% 90%, rgba(0,100,200,0.05) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .app {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 860px;
      margin: 0 auto;
    }

    /* HEADER */
    .header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 18px 24px;
      border-bottom: 1px solid var(--border);
      background: rgba(8,12,20,0.9);
      backdrop-filter: blur(10px);
      flex-shrink: 0;
    }

    .logo-ring {
      width: 44px; height: 44px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 16px var(--accent-glow), inset 0 0 10px var(--accent-glow);
      animation: pulse-ring 3s ease-in-out infinite;
      flex-shrink: 0;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 18px;
      color: var(--accent);
    }

    @keyframes pulse-ring {
      0%, 100% { box-shadow: 0 0 16px var(--accent-glow), inset 0 0 10px var(--accent-glow); }
      50% { box-shadow: 0 0 28px rgba(0,212,255,0.3), inset 0 0 16px rgba(0,212,255,0.2); }
    }

    .header-info { flex: 1; }
    .header-name { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 18px; letter-spacing: -0.3px; line-height: 1; }
    .header-name span { color: var(--accent); }

    .status-row { display: flex; align-items: center; gap: 6px; margin-top: 4px; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); animation: blink 2s ease-in-out infinite; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .status-text { font-size: 12px; color: var(--text-muted); font-weight: 300; }

    .clear-btn {
      background: none; border: 1px solid var(--border); color: var(--text-muted);
      padding: 6px 14px; border-radius: 20px; font-size: 12px;
      font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all 0.2s;
    }
    .clear-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* MESSAGES */
    .messages {
      flex: 1; overflow-y: auto; padding: 24px 24px 8px;
      display: flex; flex-direction: column; gap: 20px; scroll-behavior: smooth;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* WELCOME */
    .welcome {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; text-align: center; gap: 16px;
      padding: 40px 20px; animation: fadeUp 0.5s ease;
    }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    .welcome-icon {
      width: 72px; height: 72px; border-radius: 50%;
      border: 2px solid var(--accent);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 40px var(--accent-glow);
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: 28px; color: var(--accent);
    }

    .welcome h2 { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 28px; letter-spacing: -0.5px; }
    .welcome h2 span { color: var(--accent); }
    .welcome p { color: var(--text-muted); font-size: 14px; font-weight: 300; max-width: 320px; line-height: 1.6; }

    .badge {
      background: rgba(0,212,255,0.08);
      border: 1px solid rgba(0,212,255,0.2);
      color: var(--accent);
      font-size: 11px;
      padding: 4px 12px;
      border-radius: 20px;
      letter-spacing: 0.5px;
    }

    .suggestions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 8px; }
    .suggestion {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text-muted); padding: 8px 16px; border-radius: 20px;
      font-size: 13px; cursor: pointer; transition: all 0.2s; font-family: 'DM Sans', sans-serif;
    }
    .suggestion:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }

    /* BUBBLES */
    .message { display: flex; gap: 12px; animation: fadeUp 0.3s ease; }
    .message.user { flex-direction: row-reverse; }

    .avatar {
      width: 34px; height: 34px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 13px;
    }
    .avatar.ai { background: rgba(0,212,255,0.1); border: 1px solid var(--accent); color: var(--accent); }
    .avatar.user { background: rgba(0,153,204,0.15); border: 1px solid var(--accent2); color: var(--accent); }

    .bubble { max-width: 70%; padding: 12px 16px; border-radius: 16px; font-size: 14.5px; line-height: 1.65; font-weight: 300; }
    .message.ai .bubble { background: var(--ai-bubble); border: 1px solid var(--border); border-top-left-radius: 4px; }
    .message.user .bubble { background: var(--user-bubble); border: 1px solid rgba(0,212,255,0.2); border-top-right-radius: 4px; }

    .bubble pre { background: rgba(0,0,0,0.4); border: 1px solid var(--border); border-radius: 8px; padding: 12px; overflow-x: auto; margin: 8px 0; }
    .bubble code { font-family: monospace; font-size: 13px; background: rgba(0,212,255,0.08); padding: 2px 6px; border-radius: 4px; color: var(--accent); }
    .bubble pre code { background: none; padding: 0; color: #c9d1d9; }
    .bubble p { margin-bottom: 8px; }
    .bubble p:last-child { margin-bottom: 0; }
    .bubble ul, .bubble ol { padding-left: 20px; margin: 6px 0; }
    .bubble li { margin-bottom: 4px; }
    .bubble strong { font-weight: 600; color: var(--text); }

    /* TYPING */
    .typing-dots { display: flex; gap: 4px; padding: 4px 0; align-items: center; }
    .typing-dots span { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); animation: bounce 1.2s ease-in-out infinite; opacity: 0.6; }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%, 80%, 100% { transform: translateY(0); opacity: 0.6; } 40% { transform: translateY(-6px); opacity: 1; } }

    /* INPUT */
    .input-area {
      padding: 16px 24px 20px;
      border-top: 1px solid var(--border);
      background: rgba(8,12,20,0.9);
      backdrop-filter: blur(10px);
      flex-shrink: 0;
    }

    .input-wrapper {
      display: flex; align-items: flex-end; gap: 10px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 10px 10px 10px 16px; transition: border-color 0.2s;
    }
    .input-wrapper:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }

    #userInput {
      flex: 1; background: none; border: none; outline: none;
      color: var(--text); font-family: 'DM Sans', sans-serif;
      font-size: 14.5px; font-weight: 300; resize: none;
      max-height: 140px; line-height: 1.5; min-height: 24px;
    }
    #userInput::placeholder { color: var(--text-muted); }

    .send-btn {
      width: 38px; height: 38px; border-radius: 10px;
      background: var(--accent); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; flex-shrink: 0;
    }
    .send-btn:hover { background: var(--accent2); transform: scale(1.05); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .send-btn svg { width: 18px; height: 18px; fill: #080c14; }

    .input-footer { text-align: center; margin-top: 10px; font-size: 11px; color: var(--text-muted); font-weight: 300; }
    .input-footer span { color: rgba(0,212,255,0.5); }

    /* TOAST */
    .toast {
      position: fixed; bottom: 100px; left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: var(--error); color: white;
      padding: 10px 20px; border-radius: 8px; font-size: 13px;
      opacity: 0; transition: all 0.3s; pointer-events: none; z-index: 99;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 600px) {
      .header { padding: 14px 16px; }
      .messages { padding: 16px 16px 8px; }
      .input-area { padding: 12px 16px 16px; }
      .bubble { max-width: 85%; }
      .welcome h2 { font-size: 22px; }
    }
  </style>
</head>
<body>
<div class="app">

  <header class="header">
    <div class="logo-ring">S</div>
    <div class="header-info">
      <div class="header-name"><span>Scotty</span> AI</div>
      <div class="status-row">
        <div class="status-dot"></div>
        <span class="status-text">Online & Ready</span>
      </div>
    </div>
    <button class="clear-btn" onclick="clearChat()">Clear Chat</button>
  </header>

  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">S</div>
      <h2>Hey, I'm <span>Scotty AI</span></h2>
      <div class="badge">Powered by Google Gemini ✦ Free</div>
      <p>Your intelligent assistant. Ask me anything — I'm here to help.</p>
      <div class="suggestions">
        <button class="suggestion" onclick="sendSuggestion(this)">What can you do?</button>
        <button class="suggestion" onclick="sendSuggestion(this)">Help me write code</button>
        <button class="suggestion" onclick="sendSuggestion(this)">Explain something</button>
        <button class="suggestion" onclick="sendSuggestion(this)">Give me advice</button>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrapper">
      <textarea
        id="userInput"
        placeholder="Message Scotty AI..."
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Send">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
    <div class="input-footer">Powered by <span>Google Gemini</span> · Built by Scotty</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('userInput');
  const sendBtn    = document.getElementById('sendBtn');
  const welcomeEl  = document.getElementById('welcome');
  const toastEl    = document.getElementById('toast');

  let chatHistory = [];
  let isStreaming  = false;

  function showToast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    setTimeout(() => toastEl.classList.remove('show'), 3500);
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 140) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function scrollBottom() { messagesEl.scrollTop = messagesEl.scrollHeight; }

  function sendSuggestion(btn) { inputEl.value = btn.textContent; sendMessage(); }

  function clearChat() {
    chatHistory = [];
    messagesEl.innerHTML = '';
    messagesEl.appendChild(welcomeEl);
    welcomeEl.style.display = 'flex';
  }

  function addMessage(role, content) {
    if (welcomeEl.parentNode) welcomeEl.style.display = 'none';

    const wrapper = document.createElement('div');
    wrapper.className = `message ${role}`;

    const avatar = document.createElement('div');
    avatar.className = `avatar ${role}`;
    avatar.textContent = role === 'ai' ? 'S' : 'U';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';

    if (content === null) {
      bubble.innerHTML = `<div class="typing-dots"><span></span><span></span><span></span></div>`;
    } else {
      bubble.innerHTML = formatMessage(content);
    }

    if (role === 'ai') {
      wrapper.appendChild(avatar);
      wrapper.appendChild(bubble);
    } else {
      wrapper.appendChild(bubble);
      wrapper.appendChild(avatar);
    }

    messagesEl.appendChild(wrapper);
    scrollBottom();
    return bubble;
  }

  function formatMessage(text) {
    if (!text) return '';
    text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) =>
      `<pre><code>${escapeHtml(code.trim())}</code></pre>`);
    text = text.replace(/`([^`]+)`/g, (_, c) => `<code>${escapeHtml(c)}</code>`);
    text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    text = text.replace(/\*(.*?)\*/g, '<em>$1</em>');
    text = text.replace(/^- (.+)$/gm, '<li>$1</li>');
    text = text.replace(/(<li>.*<\/li>\n?)+/g, m => `<ul>${m}</ul>`);
    text = text.split('\n\n').map(p => p.trim() ? `<p>${p}</p>` : '').join('');
    return text || `<p>${text}</p>`;
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isStreaming) return;

    isStreaming = true;
    sendBtn.disabled = true;
    inputEl.value = '';
    inputEl.style.height = 'auto';

    addMessage('user', text);
    chatHistory.push({ role: 'user', content: text });

    // Typing indicator
    const typingWrapper = document.createElement('div');
    typingWrapper.className = 'message ai';
    const tAvatar = document.createElement('div');
    tAvatar.className = 'avatar ai';
    tAvatar.textContent = 'S';
    const tBubble = document.createElement('div');
    tBubble.className = 'bubble';
    tBubble.innerHTML = `<div class="typing-dots"><span></span><span></span><span></span></div>`;
    typingWrapper.appendChild(tAvatar);
    typingWrapper.appendChild(tBubble);
    messagesEl.appendChild(typingWrapper);
    scrollBottom();

    try {
      const response = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: chatHistory })
      });

      if (!response.ok) {
        const err = await response.json();
        throw new Error(err.error || 'Server error');
      }

      typingWrapper.remove();
      const aiBubble = addMessage('ai', '');
      let fullText = '';

      const reader  = response.body.getReader();
      const decoder = new TextDecoder();

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        const lines = decoder.decode(value, { stream: true }).split('\n');
        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          try {
            const data = JSON.parse(line.slice(6));
            if (data.error) throw new Error(data.error);
            if (data.text) {
              fullText += data.text;
              aiBubble.innerHTML = formatMessage(fullText);
              scrollBottom();
            }
            if (data.done) {
              chatHistory.push({ role: 'assistant', content: fullText });
            }
          } catch (e) {
            if (e.message !== 'Unexpected end of JSON input') throw e;
          }
        }
      }

    } catch (err) {
      typingWrapper.remove();
      showToast('⚠️ ' + (err.message || 'Something went wrong'));
      addMessage('ai', 'Sorry, I ran into an error. Please try again.');
      chatHistory.pop();
    }

    isStreaming = false;
    sendBtn.disabled = false;
    inputEl.focus();
  }
</script>
</body>
</html>
